<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Petber</title>
  <script>
    const path = window.location.pathname;

    // Ví dụ: /post/123
    if (path.startsWith("/post/")) {
      const postId = path.split("/")[2];

      // Try open app
      window.location.href = "petber://post/" + postId;

      // fallback nếu không có app
      setTimeout(() => {
        window.location.href = "https://play.google.com/store/apps/details?id=com.nvv.petber";
      }, 2000);
    }
  </script>
</head>
<body>
  <h1>Opening Petber...</h1>
</body>
</html>
