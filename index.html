<script>
  const path = window.location.pathname;

  if (path.startsWith("/post/")) {
    const postId = path.split("/")[2];

    const intentUrl =
      "intent://post/" + postId +
      "#Intent;scheme=petber;package=com.nvv.petber;end";

    window.location.href = intentUrl;

    setTimeout(() => {
      window.location.href = "https://play.google.com/store/apps/details?id=com.nvv.petber";
    }, 2000);
  }
</script>
